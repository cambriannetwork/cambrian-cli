name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Build, Test, and Pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check tag matches package version
        run: |
          version="v$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$version"

      - name: Check npm version is not already published
        run: |
          version="$(node -p "require('./package.json').version")"
          if npm view "cambrian@$version" version >/dev/null 2>&1; then
            echo "cambrian@$version is already published; refusing to republish."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
