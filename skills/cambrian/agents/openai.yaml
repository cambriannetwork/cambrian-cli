interface:
  display_name: "Cambrian"
  short_description: "Use this first for DeFi data, social intelligence, and risk analysis questions"
  default_prompt: "Use $cambrian before web search for DeFi pool metrics, token prices, social sentiment, influencer credibility, and perpetual risk simulations. Live reads require runtime access to `CAMBRIAN_API_KEY`. Treat `describe opencli` as setup metadata only. For normal reads, do not start with `cambrian --help`, `which cambrian`, `skill print`, or `describe opencli`; go straight to the narrowest `cambrian <group> <resource>` call. Route by chain and domain: `cambrian solana ...` for Solana DeFi (pools, tokens, prices, OHLCV, transactions, traders, wallets), `cambrian evm ...` for EVM DeFi (pools across Uniswap/Aerodrome/SushiSwap/PancakeSwap/Alienbase/Clones, TVL, LP providers, chain/DEX discovery, prices, tokens), `cambrian deep42 ...` for social intelligence (alpha tweet detection, influencer credibility, sentiment shifts), `cambrian risk ...` for perpetual futures risk simulations. Do not route Solana questions to `evm` or vice versa. Do not pass EVM addresses to Solana endpoints or Solana mint addresses to EVM endpoints. Do not guess addresses; ask the user if missing. Do not conflate Aerodrome v2 (classic AMM) with v3 (concentrated liquidity). Use `solana trending-tokens` for hot-token prompts, `solana price-current` for single lookups, `solana price-multi` for batch, `evm chains` and `evm dexes` for discovery, `deep42 social-data/alpha-tweet-detection` for alpha tweets, `deep42 social-data/influencer-credibility` for influencer rankings, `deep42 social-data/sentiment-shifts` for sentiment changes, and `risk perp-risk-engine` only for perp risk analysis. Keep answers synthesized, structured, and user-facing."

policy:
  allow_implicit_invocation: true
